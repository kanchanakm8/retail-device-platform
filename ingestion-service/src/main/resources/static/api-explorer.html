<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Device Platform API Explorer & Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f4f6f8;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            color: #1f2937;
        }

        .section-title {
            margin-top: 24px;
            margin-bottom: 12px;
            color: #111827;
            font-size: 18px;
            font-weight: bold;
        }

        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .field {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #374151;
        }

        select, input, textarea, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea {
            min-height: 260px;
            resize: vertical;
            font-family: monospace;
        }

        .response-box {
            background: #111827;
            color: #f9fafb;
            padding: 16px;
            border-radius: 8px;
            min-height: 240px;
            white-space: pre-wrap;
            overflow-x: auto;
            font-family: monospace;
        }

        .method-badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: bold;
            color: white;
            margin-right: 10px;
        }

        .GET { background: #16a34a; }
        .POST { background: #2563eb; }

        .info-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1d4ed8;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .url-box {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            word-break: break-all;
        }

        button {
            background: #111827;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1f2937;
        }

        .button-secondary {
            background: #475569;
        }

        .button-secondary:hover {
            background: #334155;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Retail Device Platform API Explorer & Simulator</h1>

    <div class="info-box">
        This page can act like a Swagger-style explorer and also as a device event simulator.
        Choose a device, choose a scenario, auto-generate the event, and post it.
    </div>

    <div class="section-title">API Explorer</div>

    <div class="row">
        <div class="field">
            <label for="serviceSelect">Select Service</label>
            <select id="serviceSelect" onchange="loadEndpoints()">
                <option value="ingestion">Ingestion Service</option>
                <option value="inventory">Inventory Service</option>
            </select>
        </div>

        <div class="field">
            <label for="endpointSelect">Select Endpoint</label>
            <select id="endpointSelect" onchange="updateEndpointDetails()"></select>
        </div>

        <div class="field">
            <label>Method</label>
            <div>
                <span id="methodBadge" class="method-badge POST">POST</span>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>URL</label>
            <div id="urlBox" class="url-box"></div>
        </div>

        <div class="field">
            <label for="pathParamInput">Path Variable (if needed)</label>
            <input type="text" id="pathParamInput" placeholder="Enter eventId if needed" oninput="updateUrlPreview()">
        </div>
    </div>

    <div class="section-title">Dynamic Event Simulator</div>

    <div class="row">
        <div class="field">
            <label for="deviceTypeSelect">Select Device Type</label>
            <select id="deviceTypeSelect" onchange="generateDevicePayload()">
                <option value="RFID">RFID</option>
                <option value="IOT_DEVICE">IOT_DEVICE</option>
            </select>
        </div>

        <div class="field">
            <label for="scenarioSelect">Select Scenario</label>
            <select id="scenarioSelect" onchange="generateDevicePayload()">
                <option value="SUCCESS">SUCCESS</option>
                <option value="FAILURE">FAILURE</option>
            </select>
        </div>

        <div class="field">
            <label for="sampleIdInput">Sample Device/Event Suffix</label>
            <input type="text" id="sampleIdInput" value="1001" oninput="generateDevicePayload()" placeholder="Enter suffix like 1001">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <button class="button-secondary" onclick="generateDevicePayload()">Generate Dynamic Payload</button>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label for="requestBody">Request Body</label>
            <textarea id="requestBody"></textarea>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <button onclick="sendRequest()">Send Request</button>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label for="responseBox">Response</label>
            <div id="responseBox" class="response-box">Response will appear here...</div>
        </div>
    </div>
</div>

<script>
    const services = {
        ingestion: {
            baseUrl: "http://localhost:8080",
            endpoints: [
                { name: "Health", method: "GET", path: "/api/events/health", sampleBody: "" },
                { name: "Publish Device Event", method: "POST", path: "/api/events", sampleBody: "" },
                { name: "Get All DLQ Events", method: "GET", path: "/api/dlq", sampleBody: "" },
                { name: "Get DLQ Event By ID", method: "GET", path: "/api/dlq/{eventId}", sampleBody: "" },
                { name: "Reprocess DLQ Event", method: "POST", path: "/api/dlq/{eventId}/reprocess", sampleBody: "" },
                { name: "Actuator Health", method: "GET", path: "/actuator/health", sampleBody: "" }
            ]
        },
        inventory: {
            baseUrl: "http://localhost:8081",
            endpoints: [
                { name: "Health", method: "GET", path: "/inventory/health", sampleBody: "" },
                { name: "Get All Events", method: "GET", path: "/inventory/events", sampleBody: "" },
                { name: "Get Event By ID", method: "GET", path: "/inventory/events/{eventId}", sampleBody: "" },
                { name: "Metrics", method: "GET", path: "/inventory/metrics", sampleBody: "" },
                { name: "Actuator Health", method: "GET", path: "/actuator/health", sampleBody: "" }
            ]
        }
    };

    function loadEndpoints() {
        const serviceKey = document.getElementById("serviceSelect").value;
        const endpointSelect = document.getElementById("endpointSelect");
        endpointSelect.innerHTML = "";

        services[serviceKey].endpoints.forEach((endpoint, index) => {
            const option = document.createElement("option");
            option.value = index;
            option.text = endpoint.name;
            endpointSelect.appendChild(option);
        });

        updateEndpointDetails();
    }

    function updateEndpointDetails() {
        const serviceKey = document.getElementById("serviceSelect").value;
        const endpointIndex = document.getElementById("endpointSelect").value;
        const endpoint = services[serviceKey].endpoints[endpointIndex];

        const methodBadge = document.getElementById("methodBadge");
        methodBadge.textContent = endpoint.method;
        methodBadge.className = "method-badge " + endpoint.method;

        if (endpoint.name === "Publish Device Event") {
            generateDevicePayload();
        } else {
            document.getElementById("requestBody").value = endpoint.sampleBody || "";
        }

        updateUrlPreview();
    }

    function updateUrlPreview() {
        const serviceKey = document.getElementById("serviceSelect").value;
        const endpointIndex = document.getElementById("endpointSelect").value;
        const endpoint = services[serviceKey].endpoints[endpointIndex];
        const pathParam = document.getElementById("pathParamInput").value.trim();

        let finalPath = endpoint.path;
        if (finalPath.includes("{eventId}")) {
            finalPath = finalPath.replace("{eventId}", pathParam || "{eventId}");
        }

        document.getElementById("urlBox").textContent = services[serviceKey].baseUrl + finalPath;
    }

    function generateDevicePayload() {
        const serviceKey = document.getElementById("serviceSelect").value;
        const endpointIndex = document.getElementById("endpointSelect").value;
        const endpoint = services[serviceKey].endpoints[endpointIndex];

        if (serviceKey !== "ingestion" || endpoint.name !== "Publish Device Event") {
            return;
        }

        const deviceType = document.getElementById("deviceTypeSelect").value;
        const scenario = document.getElementById("scenarioSelect").value;
        const suffix = document.getElementById("sampleIdInput").value.trim() || "1001";
        const simulateFailure = scenario === "FAILURE";

        let payloadObject;

        if (deviceType === "RFID") {
            payloadObject = {
                vendorType: "RFID",
                payload: {
                    tagId: "TAG-" + suffix,
                    epc: "EPC-" + suffix,
                    readerId: "READER-" + suffix,
                    zone: "ENTRANCE",
                    eventType: "RFID_SCAN",
                    antennaPort: 1,
                    readCount: 2,
                    rssi: -48.5,
                    timestamp: new Date().toISOString(),
                    location: {
                        storeId: "STORE-101",
                        aisle: "A1"
                    },
                    simulateFailure: simulateFailure
                }
            };
        } else if (deviceType === "IOT_DEVICE") {
            payloadObject = {
                vendorType: "IOT_DEVICE",
                payload: {
                    deviceId: "DEVICE-" + suffix,
                    deviceType: "TEMP_SENSOR",
                    deviceModel: "TS-900",
                    firmwareVersion: "1.0.2",
                    connectivityStatus: "ONLINE",
                    eventType: "DEVICE_HEARTBEAT",
                    siteId: "SITE-01",
                    zone: "COLD_STORAGE",
                    ipAddress: "192.168.1.10",
                    macAddress: "AA:BB:CC:DD:EE:" + suffix.slice(-2),
                    batteryLevel: 85,
                    signalStrength: -60.0,
                    timestamp: new Date().toISOString(),
                    metrics: {
                        temperature: 5.2,
                        humidity: 60
                    },
                    simulateFailure: simulateFailure
                }
            };
        }

        document.getElementById("requestBody").value = JSON.stringify(payloadObject, null, 2);
    }

    async function sendRequest() {
        const serviceKey = document.getElementById("serviceSelect").value;
        const endpointIndex = document.getElementById("endpointSelect").value;
        const endpoint = services[serviceKey].endpoints[endpointIndex];
        const pathParam = document.getElementById("pathParamInput").value.trim();
        const responseBox = document.getElementById("responseBox");

        let finalPath = endpoint.path;
        if (finalPath.includes("{eventId}")) {
            if (!pathParam) {
                responseBox.textContent = "Please enter eventId in the Path Variable field.";
                return;
            }
            finalPath = finalPath.replace("{eventId}", pathParam);
        }

        const url = services[serviceKey].baseUrl + finalPath;

        const options = {
            method: endpoint.method,
            headers: {
                "Content-Type": "application/json"
            }
        };

        if (endpoint.method === "POST") {
            const requestBody = document.getElementById("requestBody").value.trim();
            if (requestBody) {
                options.body = requestBody;
            }
        }

        try {
            const response = await fetch(url, options);
            const text = await response.text();

            let formattedResponse = text;
            try {
                formattedResponse = JSON.stringify(JSON.parse(text), null, 2);
            } catch (e) {
                // keep raw text
            }

            responseBox.textContent = "HTTP Status: " + response.status + "\n\n" + formattedResponse;
        } catch (error) {
            responseBox.textContent = "Request failed:\n\n" + error;
        }
    }

    loadEndpoints();
</script>
</body>
</html>
